<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geometric Figures</title>
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <link rel="stylesheet" href="styles.css?v=3" />
</head>
<body>
  <header class="app-header">
    <h1>Geometric Figures</h1>
    <p class="tagline">An interactive gallery of geometry drawings</p>
  </header>

  <div class="layout">
    <nav id="sidebar" class="sidebar" aria-label="Figure list"></nav>

    <main class="stage">
      <div class="stage-toolbar">
        <div class="stage-titles">
          <h2 id="figure-title">Select a figure</h2>
          <p id="figure-desc" class="figure-desc"></p>
        </div>
        <div class="stage-actions">
          <button id="reset-figure" class="btn" type="button">Reset</button>
          <button id="download-svg" class="btn" type="button">Download SVG</button>
        </div>
      </div>
      <div id="canvas" class="canvas"></div>
    </main>

    <aside id="controls" class="controls" aria-label="Figure options"></aside>
  </div>

  <script src="geometry.js?v=3"></script>
  <script src="figures.js?v=3"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
